# ============================================================
# v15: The Credential Permission Trap
# Difficulty: EXTREME | Type: Security Context + Volume Permissions
#
# Scenario: ML inference platform. Looks like a normal production
# deployment — no "fault" or "test" in any naming.
#
# Root Cause: Two security hardening measures CONFLICT:
#   1. Secret volume defaultMode: 0600 (owner-only read)
#   2. Container runAsUser: 1000 (non-root)
#   Secret files are owned by root → user 1000 can't read them.
#   Both measures are individually correct security best practices.
#
# Fix: Add fsGroup: 1000 to pod securityContext
#   → files become root:1000 with group-read → user 1000 can read
#
# Why this is hard:
#   1. Error log: "Cannot load API credentials" (no "permission denied")
#   2. Secret exists, has correct data, is mounted correctly
#   3. Both security settings look right individually
#   4. Requires understanding: Unix permissions + K8s volume ownership
#   5. Cannot exec to check `ls -la /secrets/`
#   6. No "fault" naming — looks like real production
#
# Cleanup: kubectl delete ns ml-serving
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: ml-serving
  labels:
    team: ml-platform
    environment: production

---
# ============================================================
# Secret with API credentials — data is correct.
# The issue is the volume mount permissions, not the data.
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: model-api-credentials
  namespace: ml-serving
  annotations:
    description: "API credentials for model registry access"
    managed-by: "vault-injector"
    rotation-policy: "90d"
type: Opaque
data:
  api-key: c2stbGl2ZS1rZXkteDdxOW0ybjNiNHY1  # base64("sk-live-key-x7q9m2n3b4v5")
  api-secret: bXMtc2VjcmV0LXI4dDZwM2s5ZjJ3NA==  # base64("ms-secret-r8t6p3k9f2w4")

---
# ============================================================
# ConfigMap — model configuration. This works fine (0644 default).
# Acts as a red herring: "ConfigMap is readable, Secret should be too"
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: ml-serving
  annotations:
    description: "Inference engine configuration"
    managed-by: "helm"
    chart: "ml-serving/inference-engine"
data:
  MODEL_NAME: "llama-3-8b"
  MODEL_VERSION: "v2.1"
  MAX_BATCH_SIZE: "32"
  TIMEOUT_MS: "5000"
  REGISTRY_URL: "https://model-registry:8443"
  LOG_LEVEL: "info"
  WORKERS: "4"

---
# ============================================================
# Healthy service: model-registry
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-registry
  namespace: ml-serving
  labels:
    app: model-registry
    component: storage
  annotations:
    description: "Model artifact registry — serves model weights and configs"
    version: "2.3.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model-registry
  template:
    metadata:
      labels:
        app: model-registry
        component: storage
    spec:
      containers:
        - name: registry
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Model Registry v2.3.0 running"
              echo "[$(date)] Serving on port 8443"
              while true; do nc -l -p 8443 2>/dev/null; sleep 0.1; done
          ports:
            - containerPort: 8443
              name: https
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi

---
apiVersion: v1
kind: Service
metadata:
  name: model-registry
  namespace: ml-serving
spec:
  selector:
    app: model-registry
  ports:
    - port: 8443
      targetPort: 8443
      name: https

---
# ============================================================
# Layer 3-4: inference-engine — CrashLoopBackOff
#
# Security hardening:
#   runAsUser: 1000, runAsNonRoot: true  (container security)
#   readOnlyRootFilesystem: true         (filesystem security)
#   Secret defaultMode: 0600             (credential protection)
#
# These are ALL correct security practices. But without fsGroup,
# the Secret files are root:root 0600 → user 1000 can't read.
#
# Container reads Secret from mounted file → permission denied
# But stderr suppressed → log just says "Cannot load API credentials"
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-engine
  namespace: ml-serving
  labels:
    app: inference-engine
    component: serving
  annotations:
    description: "ML inference engine — loads models and serves predictions"
    version: "5.1.2"
    team: "ml-platform"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inference-engine
  template:
    metadata:
      labels:
        app: inference-engine
        component: serving
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: engine
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Inference Engine v5.1.2 starting..."
              echo "[$(date)] Model: $MODEL_NAME $MODEL_VERSION"
              echo "[$(date)] Registry: $REGISTRY_URL"
              echo "[$(date)] Loading API credentials..."
              API_KEY=$(cat /secrets/api-key 2>/dev/null)
              if [ -z "$API_KEY" ]; then
                echo "[$(date)] FATAL: Cannot load API credentials. Check secrets configuration."
                exit 1
              fi
              echo "[$(date)] Credentials loaded. Connecting to model registry..."
              if ! nc -z -w 5 model-registry 8443 2>/dev/null; then
                echo "[$(date)] FATAL: Model registry unreachable."
                exit 1
              fi
              echo "[$(date)] Serving predictions on port 8080"
              while true; do nc -l -p 8080 2>/dev/null; sleep 0.1; done
          envFrom:
            - configMapRef:
                name: inference-config
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: credentials
              mountPath: /secrets
              readOnly: true
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: credentials
          secret:
            secretName: model-api-credentials
            defaultMode: 0600

---
apiVersion: v1
kind: Service
metadata:
  name: inference-engine
  namespace: ml-serving
spec:
  selector:
    app: inference-engine
  ports:
    - port: 8080
      targetPort: 8080
      name: http

---
# ============================================================
# Layer 1: prediction-api — CrashLoopBackOff (surface symptom)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-api
  namespace: ml-serving
  labels:
    app: prediction-api
    component: api
  annotations:
    description: "Prediction API — public endpoint for model inference"
    version: "3.0.1"
    team: "ml-platform"
    oncall: "ml-oncall"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prediction-api
  template:
    metadata:
      labels:
        app: prediction-api
        component: api
    spec:
      containers:
        - name: api
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Prediction API v3.0.1 starting..."
              echo "[$(date)] Checking inference-engine..."
              if ! nc -z -w 5 inference-engine 8080 2>/dev/null; then
                echo "[$(date)] ERROR: Cannot connect to inference-engine:8080"
                echo "[$(date)] FATAL: Inference backend unavailable."
                exit 1
              fi
              echo "[$(date)] Connected. Serving predictions..."
              while true; do sleep 10; done
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
