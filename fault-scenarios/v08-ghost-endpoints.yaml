# ============================================================
# v08: Ghost Endpoints
# Difficulty: Extreme | Layers: 5 | Type: Service/Endpoints
#
# Root Cause: Service "backend-svc" has NO selector (removed
#   during migration MIG-3201). A manually created Endpoints
#   object has stale IPs (172.16.73.200, 172.16.90.200) from
#   deleted pods. Healthy backend pods exist but Service
#   doesn't know about them.
#
# Fault Chain:
#   Service missing selector + stale manual Endpoints
#     → traffic routed to ghost IPs → timeout
#       → order-processor CrashLoopBackOff
#         → web-frontend CrashLoopBackOff
#
# Fix: Add selector back to Service:
#   kubectl patch svc backend-svc -n fault-demo \
#     -p '{"spec":{"selector":{"app":"backend-svc"}}}'
#
# Siclaw Result: ✅ Found root cause (stale IPs, missing selector)
#
# Suggested Prompt:
#   "fault-demo 的前端和订单处理都在崩溃，但后端服务明明是健康的"
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: fault-demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-svc
  namespace: fault-demo
  labels:
    app: backend-svc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-svc
  template:
    metadata:
      labels:
        app: backend-svc
    spec:
      containers:
        - name: backend
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command: ["sh", "-c", "while true; do nc -l -p 8080 2>/dev/null; sleep 0.1; done"]
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
# Service WITHOUT selector — root cause
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: fault-demo
  annotations:
    migration-ticket: "MIG-3201"
    migration-note: "Selector removed for manual endpoint control during blue-green cutover"
spec:
  ports:
    - port: 8080
      targetPort: 8080

---
# Manual Endpoints with GHOST IPs
apiVersion: v1
kind: Endpoints
metadata:
  name: backend-svc
  namespace: fault-demo
  annotations:
    created-by: "migration-script"
    created-at: "2026-03-10"
subsets:
  - addresses:
      - ip: 172.16.73.200
      - ip: 172.16.90.200
    ports:
      - port: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: fault-demo
  labels:
    app: order-processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
  template:
    metadata:
      labels:
        app: order-processor
    spec:
      containers:
        - name: processor
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              if ! nc -z -w 5 backend-svc 8080 2>/dev/null; then
                echo "[$(date)] FATAL: Backend service timeout."
                exit 1
              fi
              while true; do sleep 10; done

---
apiVersion: v1
kind: Service
metadata:
  name: order-processor
  namespace: fault-demo
spec:
  selector:
    app: order-processor
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: fault-demo
  labels:
    app: web-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
    spec:
      containers:
        - name: frontend
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              if ! nc -z -w 5 order-processor 8080 2>/dev/null; then
                echo "[$(date)] FATAL: Order processor unavailable."
                exit 1
              fi
              while true; do sleep 10; done
