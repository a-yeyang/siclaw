# ============================================================
# v12: Mounted Config File & Phantom Service
# Difficulty: Extreme+ | Layers: 5 | Type: Volume Mount Tracing
#
# Root Cause: ConfigMap "proxy-env" mounted as /etc/proxy/env.conf
#   contains BACKEND_HOST=data-api-staging (should be data-api).
#   Container sources this file at runtime — the hostname is NOT
#   in K8s env vars (kubectl describe shows empty Environment).
#
# "data-api-staging" is a decommissioned service (0 replicas).
# DNS resolves (service exists!) but 0 endpoints → refused.
# "data-api" (correct service) is healthy.
#
# Fix: Edit ConfigMap proxy-env: change BACKEND_HOST to "data-api"
#      + rollout restart reverse-proxy
#
# Siclaw Result: ✅ Found root cause (traced through volume mount)
#
# Suggested Prompt:
#   "fault-demo 的 web 应用和反向代理都起不来，但后端 data-api 是正常的"
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: fault-demo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: proxy-env
  namespace: fault-demo
  annotations:
    description: "Reverse proxy runtime configuration"
    managed-by: "deploy-pipeline"
    deploy-ticket: "DEPLOY-5523"
data:
  env.conf: |
    # Proxy runtime configuration
    BACKEND_HOST=data-api-staging
    BACKEND_PORT=8080
    PROXY_WORKERS=4
    PROXY_TIMEOUT=30
    PROXY_MAX_RETRIES=3
    HEALTH_CHECK_INTERVAL=10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-api
  namespace: fault-demo
  labels:
    app: data-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-api
  template:
    metadata:
      labels:
        app: data-api
    spec:
      containers:
        - name: api
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command: ["sh", "-c", "while true; do nc -l -p 8080 2>/dev/null; sleep 0.1; done"]
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: data-api
  namespace: fault-demo
spec:
  selector:
    app: data-api
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-api-staging
  namespace: fault-demo
  labels:
    app: data-api-staging
  annotations:
    description: "DEPRECATED — Decommissioned 2026-03-01"
    decommission-ticket: "DECOM-441"
    status: "inactive"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: data-api-staging
  template:
    metadata:
      labels:
        app: data-api-staging
    spec:
      containers:
        - name: api
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command: ["sh", "-c", "sleep 3600"]

---
apiVersion: v1
kind: Service
metadata:
  name: data-api-staging
  namespace: fault-demo
  annotations:
    status: "inactive"
spec:
  selector:
    app: data-api-staging
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reverse-proxy
  namespace: fault-demo
  labels:
    app: reverse-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reverse-proxy
  template:
    metadata:
      labels:
        app: reverse-proxy
    spec:
      containers:
        - name: proxy
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Reverse Proxy v2.0.4 starting..."
              echo "[$(date)] Loading configuration from /etc/proxy/env.conf..."
              . /etc/proxy/env.conf
              echo "[$(date)] Configuration loaded. Workers=$PROXY_WORKERS Timeout=${PROXY_TIMEOUT}s"
              echo "[$(date)] Performing backend health check..."
              if ! nc -z -w 5 $BACKEND_HOST $BACKEND_PORT 2>/dev/null; then
                echo "[$(date)] FATAL: Backend health check failed. Check proxy configuration."
                exit 1
              fi
              while true; do nc -l -p 80 2>/dev/null; sleep 0.1; done
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/proxy
              readOnly: true
          ports:
            - containerPort: 80
      volumes:
        - name: proxy-config
          configMap:
            name: proxy-env

---
apiVersion: v1
kind: Service
metadata:
  name: reverse-proxy
  namespace: fault-demo
spec:
  selector:
    app: reverse-proxy
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: fault-demo
  labels:
    app: web-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: webapp
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              if ! nc -z -w 5 reverse-proxy 80 2>/dev/null; then
                echo "[$(date)] FATAL: Proxy unavailable."
                exit 1
              fi
              while true; do sleep 10; done
