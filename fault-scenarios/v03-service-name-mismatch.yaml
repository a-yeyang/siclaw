# ============================================================
# v03: Service Name Mismatch
# Difficulty: Medium | Layers: 5 | Type: Config Tracing
#
# Root Cause: ConfigMap "data-pipeline-config" has
#   UPSTREAM_SVC=data-processor-api (old name, service was renamed)
#   Actual service: "data-processor" (new name after refactor OPS-4832)
#
# Fault Chain:
#   ConfigMap UPSTREAM_SVC=data-processor-api (wrong)
#     → aggregator readinessProbe: nc -z $UPSTREAM_SVC → DNS NXDOMAIN
#       → aggregator Running 0/1 (Not Ready)
#         → Service 0 endpoints
#           → report-generator CrashLoopBackOff
#
# Fix: Change ConfigMap UPSTREAM_SVC to "data-processor"
#      + rollout restart aggregator
#
# Siclaw Result: ✅ Found root cause (traced to ConfigMap)
#
# Suggested Prompt:
#   "fault-demo namespace 里的数据管道好像挂了，帮我看看怎么回事"
#
# Key Challenge:
#   - readinessProbe uses $UPSTREAM_SVC (visible clue in describe)
#   - data-processor pod/service healthy (correct name exists)
#   - Siclaw must compare ConfigMap value vs actual service name
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: fault-demo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: data-pipeline-config
  namespace: fault-demo
  annotations:
    description: "Shared configuration for data pipeline services"
    last-modified: "2026-03-18T09:15:00Z"
    modified-by: "ci-pipeline"
    change-ticket: "OPS-4832"
data:
  UPSTREAM_SVC: "data-processor-api"
  UPSTREAM_PORT: "8080"
  RETRY_COUNT: "3"
  BATCH_SIZE: "500"
  LOG_LEVEL: "info"
  QUEUE_NAME: "pipeline-tasks"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-processor
  namespace: fault-demo
  labels:
    app: data-processor
  annotations:
    description: "Core data processing engine"
    version: "4.2.0"
    renamed-from: "data-processor-api"
    rename-ticket: "OPS-4832"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-processor
  template:
    metadata:
      labels:
        app: data-processor
    spec:
      containers:
        - name: processor
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Data Processor v4.2.0 listening on port 8080"
              while true; do nc -l -p 8080 2>/dev/null; sleep 0.1; done
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: data-processor
  namespace: fault-demo
  annotations:
    description: "Data processing engine (renamed from data-processor-api)"
spec:
  selector:
    app: data-processor
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
  namespace: fault-demo
  labels:
    app: aggregator
  annotations:
    description: "Data aggregation layer"
    version: "2.1.3"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
    spec:
      containers:
        - name: aggregator
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Aggregator v2.1.3 starting..."
              echo "[$(date)] Upstream: $UPSTREAM_SVC:$UPSTREAM_PORT"
              while true; do nc -l -p 8080 2>/dev/null; sleep 0.1; done
          envFrom:
            - configMapRef:
                name: data-pipeline-config
          ports:
            - containerPort: 8080
          readinessProbe:
            exec:
              command: ["sh", "-c", "nc -z $UPSTREAM_SVC $UPSTREAM_PORT 2>/dev/null"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: aggregator
  namespace: fault-demo
spec:
  selector:
    app: aggregator
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-generator
  namespace: fault-demo
  labels:
    app: report-generator
  annotations:
    description: "Generates reports by querying the aggregation layer"
    version: "1.8.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: report-generator
  template:
    metadata:
      labels:
        app: report-generator
    spec:
      containers:
        - name: generator
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Report Generator v1.8.0 starting..."
              if ! nc -z -w 5 aggregator 8080 2>/dev/null; then
                echo "[$(date)] FATAL: Aggregation layer unavailable."
                exit 1
              fi
              while true; do sleep 10; done
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
