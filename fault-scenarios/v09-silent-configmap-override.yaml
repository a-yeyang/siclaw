# ============================================================
# v09: Silent ConfigMap Override
# Difficulty: Extreme | Layers: 5 | Type: Config Tracing
#
# Root Cause: Two ConfigMaps loaded via envFrom. First has
#   DB_PORT=5432 (correct). Second has DB_PORT=5433 (stale
#   incident override from INC-4455). K8s precedence: last
#   envFrom wins → pod gets 5433.
#
# Trap: First ConfigMap has CORRECT value → looks fine!
#
# Fix: Remove DB_PORT from env-overrides ConfigMap
#      + rollout restart data-api
#
# Siclaw Result: ✅ Found root cause (2/2 runs)
#
# Suggested Prompt:
#   "fault-demo 的报表服务和数据 API 都起不来，数据库是正常的"
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: fault-demo

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: fault-demo
  annotations:
    managed-by: "helm"
    chart-version: "2.4.0"
data:
  APP_NAME: "data-api"
  APP_ENV: "production"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "analytics"
  DB_USER: "app_readonly"
  POOL_SIZE: "10"
  LOG_LEVEL: "info"
  CACHE_TTL: "300"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-overrides
  namespace: fault-demo
  annotations:
    purpose: "Incident response overrides — should be cleaned up after resolution"
    incident: "INC-4455"
    applied-by: "ops-oncall"
    incident-status: "resolved"
data:
  DB_PORT: "5433"
  POOL_SIZE: "5"
  LOG_LEVEL: "debug"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: fault-demo
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command: ["sh", "-c", "while true; do nc -l -p 5432 2>/dev/null; sleep 0.1; done"]
          ports:
            - containerPort: 5432
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: fault-demo
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-api
  namespace: fault-demo
  labels:
    app: data-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-api
  template:
    metadata:
      labels:
        app: data-api
    spec:
      containers:
        - name: api
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              echo "[$(date)] Data API starting..."
              echo "[$(date)] Config: host=$DB_HOST port=$DB_PORT db=$DB_NAME"
              if ! nc -z -w 5 $DB_HOST $DB_PORT 2>/dev/null; then
                echo "[$(date)] WARNING: Cannot reach $DB_HOST:$DB_PORT"
              fi
              echo "[$(date)] Listening on port 8080"
              while true; do nc -l -p 8080 2>/dev/null; sleep 0.1; done
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: env-overrides
          ports:
            - containerPort: 8080
          readinessProbe:
            exec:
              command: ["sh", "-c", "nc -z -w 2 $DB_HOST $DB_PORT 2>/dev/null"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: data-api
  namespace: fault-demo
spec:
  selector:
    app: data-api
  ports:
    - port: 8080
      targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
  namespace: fault-demo
  labels:
    app: report-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: report-service
  template:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
        - name: reporter
          image: registry-cn-shanghai.siflow.cn/k8s-dev/busybox:latest
          command:
            - sh
            - -c
            - |
              if ! nc -z -w 5 data-api 8080 2>/dev/null; then
                echo "[$(date)] FATAL: Data API unavailable."
                exit 1
              fi
              while true; do sleep 10; done
