# v0 reference case — ImagePullBackOff scenario.
#
# Fault: create a fresh Deployment with a non-existent image, causing K8s to
# report ImagePullBackOff / ErrImagePull on the resulting pod.
# Recovery: delete the Deployment entirely — environment is left clean.
#
# Oracle philosophy: do NOT lock down the skill path. Siclaw has multiple
# legitimate routes to this diagnosis (kubectl-get-pods → describe, or
# checking containerd logs, or inspecting ReplicaSet history). The oracle
# only verifies the OUTCOME: agent identified image pull failure and named it.
#
# DO NOT point this at siclaw-portal / siclaw-runtime — breaking them would
# also break the trigger and trace-read paths.

id: image-pull-failure-001
title: "ImagePullBackOff: agent must identify pull failure and name the failing pod"

fault:
  inject: |
    kubectl -n siclaw create deployment eval-image-pull-target \
      --image=registry.invalid.siclaw-eval/this-image-does-not-exist:fault \
      --replicas=1 || true
  recover: |
    kubectl -n siclaw delete deployment eval-image-pull-target --ignore-not-found=true
  propagation_wait_sec: 30  # enough for the Deployment to roll a fresh ReplicaSet

trigger:
  prompt: |
    siclaw namespace 里有一个 Deployment 叫 eval-image-pull-target，
    它的 pod 现在没有正常运行。请帮我诊断根本原因，
    告诉我是什么 Kubernetes failure reason。
  agent: 163b9c85-16e5-4aa2-b40e-573fe7ae8b39
  max_steps: 10

oracle:
  # No must_use — any skill path that reaches the correct diagnosis is valid.
  # Observed valid paths: kubectl-get-pods → describe, node-logs (containerd),
  # kubectl-get-rs → describe-rs.
  must_use_skills: []
  may_use_skills:
    - kubectl-get-pods
    - kubectl-describe-pod
    - kubectl-get-events
    - kubectl-get-deployment
    - kubectl-logs
    - node-logs
  # Skills with no relevance to image-pull failures — their invocation
  # indicates the agent is on the wrong track entirely.
  must_not_use_skills:
    - roce-perftest-pod
    - find-node
  # Accept any of the standard K8s error strings for image pull failure.
  rca_must_contain:
    - "ImagePullBackOff"
    - "ErrImagePull"
    - "image pull"
    - "镜像拉取"
  recommendation_must_contain:
    - "image"
    - "镜像"

budget:
  ttl_sec: 600
  max_tokens: 50000
